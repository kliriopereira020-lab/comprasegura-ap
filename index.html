<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVARES - Compras Inteligentes</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #00C853;
      --bg: #080808;
      --surface: #111111;
      --border: #1e1e1e;
      --text: #ffffff;
      --max-width: 860px;
    }
    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 100px;
    }
    .logo-avares { font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 800; color: #fff; margin-bottom: 10px; }
    .logo-avares span { color: var(--green); }
    h1 { font-family: 'Syne', sans-serif; font-size: clamp(24px, 5vw, 42px); font-weight: 800; text-align: center; margin-bottom: 30px; }
    .search-box { display: flex; width: 100%; max-width: 600px; background: #111; border: 1px solid #242424; border-radius: 16px; padding: 8px; margin-bottom: 40px; }
    input { flex: 1; background: none; border: none; outline: none; color: #eee; padding-left: 15px; font-size: 16px; }
    .search-btn { padding: 12px 24px; border-radius: 12px; border: none; background: var(--green); color: #fff; font-weight: 700; cursor: pointer; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: var(--max-width); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px; }
    .preco { font-size: 24px; font-weight: 800; color: var(--green); margin: 10px 0; }
    .btn-comprar { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--green); color: #fff; font-weight: 800; cursor: pointer; }
    #loading { display: none; text-align: center; margin: 20px; }
  </style>
</head>
<body>

  <div class="logo-avares">AVA<span>RES</span></div>
  <h1>Encontre as melhores ofertas<br>reais do AliExpress</h1>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="O que você quer comprar?" />
    <button class="search-btn" onclick="pesquisar()">Buscar</button>
  </div>

  <div id="loading">Buscando produtos reais...</div>
  <div id="resultados" class="cards-grid"></div>

  <script>
    async function pesquisar() {
      const query = document.getElementById('searchInput').value;
      if (!query) return;

      document.getElementById('resultados').innerHTML = '';
      document.getElementById('loading').style.display = 'block';

      try {
        const res = await fetch("/.netlify/functions/chat", {
          method: "POST",
          body: JSON.stringify({ query: query })
        });

        const data = await res.json();
        
        if (data.error) {
          alert("Erro no Servidor: " + (data.detail || data.error));
          return;
        }

        if (!data.resultados || data.resultados.length === 0) {
          alert("Nenhum produto encontrado para: " + query);
          return;
        }

        renderResultados(data.resultados);
      } catch (e) {
        alert("Erro de conexão. Verifique se o arquivo chat.js foi enviado corretamente para o Netlify.");
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    function renderResultados(produtos) {
      const container = document.getElementById('resultados');
      container.innerHTML = '';
      produtos.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div style="font-size: 11px; color: #555;">${item.vendedor}</div>
          <div style="font-size: 14px; margin: 10px 0; height: 40px; overflow: hidden;">${item.titulo}</div>
          <div class="preco">US$ ${item.preco_min}</div>
          <button class="btn-comprar" onclick="window.open('${item.link}', '_blank')">COMPRAR</button>
        `;
        container.appendChild(card);
      });
    }
  </script>
</body>
</html>
