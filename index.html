<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVERIS - Compras Inteligentes</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00C853;
      --green-dark: #00a846;
      --bg: #080808;
      --surface: #111111;
      --border: #1e1e1e;
      --text: #ffffff;
      --text-muted: #555555;
      --max-width: 860px;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 100px;
      background-image: radial-gradient(ellipse 80% 40% at 50% -10%, #00C85308, transparent);
    }

    .hero { width: 100%; max-width: var(--max-width); text-align: center; margin-bottom: 40px; }
    
    /* LOGO AVERIS */
    .logo-averis { font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 800; color: #fff; margin-bottom: 10px; letter-spacing: -1px; }
    .logo-averis span { color: #00C853; }

    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: #111; border: 1px solid #1e1e1e;
      border-radius: 99px; padding: 6px 16px; margin-bottom: 20px;
      color: #555; font-size: 11px; letter-spacing: 2px; font-weight: 700;
      font-family: 'Syne', sans-serif;
    }

    h1 { font-family: 'Syne', sans-serif; font-size: clamp(24px, 5vw, 42px); font-weight: 800; line-height: 1.1; margin-bottom: 15px; }
    h1 span { background: linear-gradient(135deg, #00C853, #69f0ae); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .search-wrap { width: 100%; max-width: 600px; margin-bottom: 40px; }
    .search-box { display: flex; gap: 8px; background: #111; border: 1px solid #242424; border-radius: 16px; padding: 8px; }
    input { flex: 1; background: none; border: none; outline: none; color: #eee; padding-left: 15px; font-size: 16px; }
    
    button.search-btn {
      padding: 12px 24px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #00C853, #00a846);
      color: #fff; font-weight: 700; cursor: pointer; font-family: 'Syne', sans-serif;
    }

    /* CARDS */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: var(--max-width); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px; position: relative; transition: 0.3s; }
    .card.destaque { border-color: #00C85366; background: #0d1a0d; }
    
    .preco { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: #00C853; margin: 10px 0; }
    .produto-nome { font-size: 14px; color: #ccc; margin-bottom: 15px; height: 40px; overflow: hidden; }

    .btn-comprar {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: #00C853; color: #fff; font-weight: 800;
      cursor: pointer; font-family: 'Syne', sans-serif; transition: 0.2s;
    }
    .btn-comprar:hover { background: #00a846; transform: scale(1.02); }

    .loading { text-align: center; padding: 40px; display: none; }
    .spinner { width: 40px; height: 40px; border: 4px solid #111; border-top-color: #00C853; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="hero">
    <div class="logo-averis">AVE<span>RIS</span></div>
    <div class="badge">🛡️ PROJETO OFICIAL</div>
    <h1>Encontre ofertas reais no<br><span>AliExpress em segundos.</span></h1>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="O que você quer comprar hoje?" />
      <button class="search-btn" onclick="pesquisar()">Buscar</button>
    </div>
  </div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Consultando API do AliExpress...</p>
  </div>

  <div id="resultados" class="cards-grid"></div>

  <script>
    async function pesquisar() {
      const query = document.getElementById('searchInput').value;
      if (!query) return;

      document.getElementById('resultados').innerHTML = '';
      document.getElementById('loading').style.display = 'block';

      try {
        const res = await fetch("/.netlify/functions/chat", {
          method: "POST",
          body: JSON.stringify({ query: query })
        });

        const data = await res.json();
        renderResultados(data.resultados);
      } catch (e) {
        alert("Erro ao buscar produtos. Verifique suas chaves no Netlify.");
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    function renderResultados(produtos) {
      const container = document.getElementById('resultados');
      container.innerHTML = '';

      produtos.forEach(item => {
        const card = document.createElement('div');
        card.className = `card ${item.destaque ? 'destaque' : ''}`;
        card.innerHTML = `
          <div style="font-size: 10px; color: #555; margin-bottom: 8px;">${item.vendedor}</div>
          <div class="produto-nome">${item.titulo}</div>
          <div class="preco">R$ ${item.preco_min}</div>
          <button class="btn-comprar" onclick="comprar('${item.link}')">
            COMPRAR AGORA
          </button>
        `;
        container.appendChild(card);
      });
    }

    function comprar(link) {
      // Abre o link de afiliado que gera comissão
      window.open(link, '_blank');
    }
  </script>
</body>
</html>
