<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CompraSegura</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080808;
      font-family: 'Syne', sans-serif;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 80px;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 10px;
      background: #111; border: 1px solid #1e1e1e;
      border-radius: 99px; padding: 6px 16px; margin-bottom: 16px;
      color: #555; font-size: 11px; letter-spacing: 2px; font-weight: 700;
    }
    h1 { font-size: 36px; font-weight: 800; line-height: 1.1; text-align: center; }
    h1 span {
      background: linear-gradient(135deg, #00C853, #00e676);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle { color: #444; font-size: 13px; margin-top: 10px; text-align: center; }
    .search-box {
      width: 100%; max-width: 520px; margin: 28px 0 16px;
      display: flex; gap: 8px;
      background: #111; border: 1px solid #1e1e1e;
      border-radius: 14px; padding: 8px 8px 8px 16px;
    }
    input {
      flex: 1; background: none; border: none; outline: none;
      color: #eee; font-size: 15px; font-family: 'Syne', sans-serif;
    }
    input::placeholder { color: #444; }
    button.search-btn {
      padding: 10px 20px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #00C853, #00a846);
      color: #fff; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: 'Syne', sans-serif;
      white-space: nowrap;
    }
    button.search-btn:disabled {
      background: #1a1a1a; color: #444; cursor: not-allowed;
    }
    .populares {
      width: 100%; max-width: 520px;
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px;
    }
    .populares span { color: #444; font-size: 11px; align-self: center; }
    .pop-btn {
      background: #111; border: 1px solid #1e1e1e;
      border-radius: 99px; color: #666; font-size: 11px;
      padding: 4px 12px; cursor: pointer; font-family: 'Syne', sans-serif;
    }
    .resultados { width: 100%; max-width: 520px; }
    .produto-titulo { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .produto-resumo { color: #555; font-size: 13px; margin-bottom: 20px; }
    .card {
      background: #111; border: 1px solid #1e1e1e;
      border-radius: 16px; padding: 20px; margin-bottom: 12px;
      position: relative; transition: all 0.3s;
      opacity: 0; transform: translateY(20px);
      animation: fadeIn 0.4s ease forwards;
    }
    .card.destaque {
      background: #0f1a0f; border-color: #00C85344;
      box-shadow: 0 0 30px #00C85312;
    }
    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
    }
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.25s; }
    .card:nth-child(3) { animation-delay: 0.4s; }
    .tag-recomendado {
      position: absolute; top: -10px; right: 16px;
      background: linear-gradient(135deg, #00C853, #00a846);
      color: #fff; font-size: 10px; font-weight: 800;
      padding: 3px 12px; border-radius: 99px; letter-spacing: 1.5px;
    }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .loja-nome { color: #888; font-size: 12px; font-weight: 600; letter-spacing: 1px; }
    .produto-nome { color: #eee; font-size: 14px; font-weight: 600; line-height: 1.4; margin-top: 4px; }
    .preco { color: #fff; font-size: 18px; font-weight: 800; text-align: right; }
    .preco-max { color: #555; font-size: 11px; }
    .stars { display: flex; gap: 2px; margin-bottom: 12px; }
    .star { font-size: 12px; }
    .nivel-badge {
      font-size: 10px; font-weight: 700; padding: 2px 8px;
      border-radius: 99px; letter-spacing: 1px; margin-left: 8px;
    }
    .nota { color: #555; font-size: 11px; margin-left: 8px; }
    .tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .tag {
      background: #1a1a1a; color: #888; font-size: 11px;
      padding: 3px 10px; border-radius: 99px;
    }
    .motivo { color: #666; font-size: 12px; margin-bottom: 14px; line-height: 1.4; }
    .btn-comprar {
      width: 100%; padding: 11px; border-radius: 10px;
      border: 1px solid #2a2a2a; background: #1a1a1a;
      color: #888; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: 'Syne', sans-serif;
      letter-spacing: 0.5px; transition: all 0.2s;
    }
    .btn-comprar.destaque {
      background: linear-gradient(135deg, #00C853, #00a846);
      border: none; color: #fff;
    }
    .dica {
      background: #0a0f0a; border: 1px solid #00C85322;
      border-radius: 14px; padding: 16px; margin-top: 8px;
    }
    .dica-titulo { color: #00C853; font-size: 12px; font-weight: 700; letter-spacing: 1px; margin-bottom: 6px; }
    .dica-texto { color: #666; font-size: 13px; line-height: 1.5; }
    .btn-nova {
      width: 100%; margin-top: 16px; padding: 13px;
      background: none; border: 1px solid #1e1e1e;
      border-radius: 12px; color: #444; font-size: 13px;
      cursor: pointer; font-family: 'Syne', sans-serif;
    }
    .loading { text-align: center; padding: 40px; }
    .loading-icon { font-size: 32px; margin-bottom: 12px; }
    .loading-text { color: #444; font-size: 14px; }
    .erro { color: #FF4444; font-size: 14px; text-align: center; margin: 16px 0; }
    .stars-row { display: flex; align-items: center; margin-bottom: 12px; }
  </style>
</head>
<body>

  <div class="badge">🛡️ COMPRA SEGURA</div>
  <h1>Compra mais barato.<br><span>Sem levar golpe.</span></h1>
  <p class="subtitle">Comparamos AliExpress, Mercado Livre e Amazon por ti</p>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Ex: iPhone 16, tênis Nike, perfume..." />
    <button class="search-btn" id="searchBtn" onclick="pesquisar()">Pesquisar</button>
  </div>

  <div class="populares" id="populares">
    <span>Popular:</span>
    <button class="pop-btn" onclick="setQuery('iPhone 16')">iPhone 16</button>
    <button class="pop-btn" onclick="setQuery('AirPods Pro')">AirPods Pro</button>
    <button class="pop-btn" onclick="setQuery('Tênis Nike')">Tênis Nike</button>
    <button class="pop-btn" onclick="setQuery('Smart TV 50')">Smart TV 50"</button>
    <button class="pop-btn" onclick="setQuery('Perfume importado')">Perfume importado</button>
  </div>

  <div id="erro" class="erro" style="display:none"></div>
  <div id="loading" class="loading" style="display:none">
    <div class="loading-icon">🔍</div>
    <div class="loading-text" id="loadingText">A comparar preços e segurança...</div>
  </div>
  <div id="resultados" class="resultados" style="display:none"></div>

  <script>
    const SYSTEM_PROMPT = `Você é o assistente do CompraSegura. Quando pesquisarem um produto, responda APENAS em JSON puro sem markdown:
{"produto":"nome","resumo":"frase curta","resultados":[{"id":"1","loja":"AliExpress","titulo":"nome produto","preco_min":100,"preco_max":150,"nota_seguranca":8,"nivel":"SEGURO","vendedor":"Loja Oficial","envio":"15 a 30 dias","motivo":"frase curta","destaque":true},{"id":"2","loja":"Mercado Livre","titulo":"nome produto","preco_min":200,"preco_max":250,"nota_seguranca":7,"nivel":"SEGURO","vendedor":"Vendedor Verificado","envio":"3 a 7 dias","motivo":"frase curta","destaque":false},{"id":"3","loja":"Amazon","titulo":"nome produto","preco_min":180,"preco_max":220,"nota_seguranca":9,"nivel":"SEGURO","vendedor":"Amazon","envio":"Prime 1 a 2 dias","motivo":"frase curta","destaque":false}],"dica":"dica de segurança"}
Sempre 3 resultados. Preços em reais brasileiros realistas. Só um destaque:true.`;

    const nivelCores = {
      SEGURO: { bg: "#00C85320", text: "#00C853" },
      CUIDADO: { bg: "#FFB80020", text: "#FFB800" },
      SUSPEITO: { bg: "#FF444420", text: "#FF4444" }
    };
    const lojaIcones = { "AliExpress": "🛒", "Mercado Livre": "🛍️", "Amazon": "📦" };

    let dots = 0;
    let dotsInterval;

    function setQuery(q) {
      document.getElementById('searchInput').value = q;
    }

    function stars(nota) {
      const s = Math.round(nota / 2);
      let h = '';
      for (let i = 1; i <= 5; i++) {
        h += `<span class="star" style="color:${i<=s?'#FFB800':'#333'}">★</span>`;
      }
      return h;
    }

    async function pesquisar() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;

      document.getElementById('populares').style.display = 'none';
      document.getElementById('resultados').style.display = 'none';
      document.getElementById('erro').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      document.getElementById('searchBtn').disabled = true;

      dotsInterval = setInterval(() => {
        dots = (dots + 1) % 4;
        document.getElementById('loadingText').textContent = 'A comparar preços e segurança' + '.'.repeat(dots);
      }, 400);

      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            system: SYSTEM_PROMPT,
            messages: [{ role: "user", content: "Pesquisa: " + query }]
          })
        });

        const data = await res.json();
        const text = (data.content || []).map(b => b.text || '').join('');
        const clean = text.replace(/```json|```/g, '').trim();
        const d = JSON.parse(clean);

        clearInterval(dotsInterval);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('searchBtn').disabled = false;
        renderResultados(d);

      } catch(e) {
        clearInterval(dotsInterval);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('searchBtn').disabled = false;
        document.getElementById('erro').textContent = 'Erro ao pesquisar. Tenta novamente.';
        document.getElementById('erro').style.display = 'block';
        document.getElementById('populares').style.display = 'flex';
      }
    }

    function comprar(loja, titulo) {
      if (loja === 'AliExpress') window.open('https://www.aliexpress.com/wholesale?SearchText=' + encodeURIComponent(titulo), '_blank');
      else if (loja === 'Mercado Livre') window.open('https://www.mercadolivre.com.br/busca?q=' + encodeURIComponent(titulo), '_blank');
      else if (loja === 'Amazon') window.open('https://www.amazon.com.br/s?k=' + encodeURIComponent(titulo), '_blank');
    }

    function renderResultados(d) {
      const cor = nivelCores;
      let html = `<div class="produto-titulo">${d.produto}</div>`;
      html += `<div class="produto-resumo">${d.resumo}</div>`;

      d.resultados.forEach(item => {
        const c = cor[item.nivel] || cor.CUIDADO;
        html += `<div class="card ${item.destaque ? 'destaque' : ''}">`;
        if (item.destaque) html += `<div class="tag-recomendado">MAIS RECOMENDADO</div>`;
        html += `<div class="card-header">
          <div>
            <div class="loja-nome">${lojaIcones[item.loja] || '🛒'} ${item.loja}</div>
            <div class="produto-nome">${item.titulo}</div>
          </div>
          <div>
            <div class="preco">R$${item.preco_min}</div>
            ${item.preco_max > item.preco_min ? `<div class="preco-max">até R$${item.preco_max}</div>` : ''}
          </div>
        </div>`;
        html += `<div class="stars-row">
          <div class="stars">${stars(item.nota_seguranca)}</div>
          <span class="nivel-badge" style="background:${c.bg};color:${c.text}">${item.nivel}</span>
          <span class="nota">${item.nota_seguranca}/10</span>
        </div>`;
        html += `<div class="tags">
          <span class="tag">👤 ${item.vendedor}</span>
          <span class="tag">🚚 ${item.envio}</span>
        </div>`;
        html += `<div class="motivo">${item.motivo}</div>`;
        html += `<button class="btn-comprar ${item.destaque ? 'destaque' : ''}" onclick="comprar('${item.loja}', '${item.titulo.replace(/'/g, "\\'")}')">
          ${item.destaque ? '✅ Comprar com Segurança' : 'Ver Produto'}
        </button>`;
        html += `</div>`;
      });

      if (d.dica) {
        html += `<div class="dica">
          <div class="dica-titulo">💡 DICA DE SEGURANÇA</div>
          <div class="dica-texto">${d.dica}</div>
        </div>`;
      }

      html += `<button class="btn-nova" onclick="novaP()">Nova pesquisa</button>`;

      const r = document.getElementById('resultados');
      r.innerHTML = html;
      r.style.display = 'block';
    }

    function novaP() {
      document.getElementById('resultados').style.display = 'none';
      document.getElementById('populares').style.display = 'flex';
      document.getElementById('searchInput').value = '';
    }

    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') pesquisar();
    });
  </script>
</body>
</html>
